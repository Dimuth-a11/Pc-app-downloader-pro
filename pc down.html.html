<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dimuth App Store</title>
    <style>
        /* General Setup */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0; background-color: #f4f7f6; color: #333;
        }
        .container { width: 85%; max-width: 1200px; margin: 0 auto; }
        
        /* Header & Secret Login Button */
        header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white; padding: 40px 0; text-align: center; position: relative;
        }
        header h1 { margin: 0; font-size: 2.5rem; }
        .admin-login-btn {
            position: absolute; top: 15px; right: 15px;
            background: rgba(255,255,255,0.2); color: white; border: none;
            padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 0.8rem;
        }

        /* Upload Menu (Hidden by Default) */
        #upload-menu {
            display: none; background: white; max-width: 600px; margin: 30px auto;
            padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        #upload-menu h2 { margin-top: 0; color: #1e3c72; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box;
        }
        .submit-btn {
            background: #28a745; color: white; border: none; padding: 10px 20px;
            border-radius: 5px; font-weight: bold; cursor: pointer; width: 100%;
        }

        /* Software Grid Layout */
        .software-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px; padding: 40px 0 80px 0;
        }
        .software-card {
            background: white; border-radius: 10px; padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center;
        }
        .app-icon { width: 70px; height: 70px; border-radius: 15px; object-fit: cover; }
        .software-card h3 { color: #1e3c72; margin: 10px 0; }
        .software-card p { font-size: 0.95rem; color: #666; }
        
        /* Screenshots & Video */
        .screenshot-gallery { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; }
        .screenshot-img { width: 120px; height: 70px; object-fit: cover; border-radius: 5px; }
        .video-container {
            position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; margin: 15px 0; border-radius: 5px;
        }
        .video-container iframe { position: absolute; top:0; left:0; width:100%; height:100%; }
        
        .download-btn {
            display: inline-block; background: #28a745; color: white; text-decoration: none;
            padding: 10px 25px; border-radius: 5px; font-weight: bold; margin-top: 15px;
        }
        footer { text-align: center; padding: 20px; background: #222; color: white; font-size: 0.9rem; }
    </style>
</head>
<body>

    <!-- Header Section with Secret Button -->
    <header>
        <button class="admin-login-btn" onclick="checkPassword()">Admin Panel</button>
        <div class="container">
            <h1>💻 Dimuth App Store</h1>
            <p>මම නිර්මාණය කළ සහ අප්ලෝඩ් කරන මෘදුකාංග මෙතැනින් ලබාගන්න</p>
        </div>
    </header>

    <!-- Secret Upload Menu -->
    <div class="container">
        <div id="upload-menu">
            <h2>📤 Add New Software (Admin Menu)</h2>
            <div class="form-group">
                <label>App Name (නම):</label>
                <input type="text" id="appName" placeholder="e.g. My Super App">
            </div>
            <div class="form-group">
                <label>App Icon URL (පින්තූර ලින්ක් එක):</label>
                <input type="text" id="appIcon" placeholder="https://example.com/icon.png">
            </div>
            <div class="form-group">
                <label>Description (විස්තරය):</label>
                <textarea id="appDesc" rows="3" placeholder="App එක ගැන විස්තරයක්..."></textarea>
            </div>
            <div class="form-group">
                <label>Screenshot URL (Ona nam pamanak):</label>
                <input type="text" id="appScreenshot" placeholder="https://example.com/screen.png">
            </div>
            <div class="form-group">
                <label>YouTube Video URL (Ona nam pamanak):</label>
                <input type="text" id="appVideo" placeholder="https://www.youtube.com/watch?v=...">
            </div>
            <div class="form-group">
                <label>File Size:</label>
                <input type="text" id="appSize" placeholder="e.g. 45 MB">
            </div>
            <div class="form-group">
                <label>Download Link (Google Drive / Mega):</label>
                <input type="text" id="appLink" placeholder="https://drive.google.com/...">
            </div>
            <button class="submit-btn" onclick="addNewSoftware()">Publish App to Page</button>
        </div>
    </div>

    <!-- Main App Grid -->
    <main class="container">
        <div class="software-grid" id="apps-container">
            
            <!-- Default App (Sample) -->
            <div class="software-card">
                <img src="https://cdn-icons-png.flaticon.com/512/732/732228.png" class="app-icon" alt="Icon">
                <h3>Sample Browser</h3>
                <p>මේක ඔයාගේ වෙබ් අඩවිය වැඩ කරන හැටි බලන්න දාපු Sample App එකක්.</p>
                <small style="display:block; color:#999;">Size: 25 MB</small>
                <a href="#" class="download-btn">Download Now</a>
            </div>

        </div>
    </main>

    <footer>
        <p>&copy; 2026 Dimuth App Store. Secured with Private Password.</p>
    </footer>

    <!-- Logic Setup (JavaScript) -->
    <script>
        // Password එක පරීක්ෂා කිරීමේ ක්‍රියාවලිය
        function checkPassword() {
            const passwordInput = prompt("කරුණාකර Admin Password එක ඇතුළත් කරන්න:");
            const correctPassword = "1234567890dimuth@dimuth";

            if (passwordInput === correctPassword) {
                alert("Password එක නිවැරදියි! Upload Menu එක දැන් විවෘතයි.");
                document.getElementById('upload-menu').style.display = 'block';
                // Upload Form එක තියෙන තැනට Scroll කිරීම
                document.getElementById('upload-menu').scrollIntoView({ behavior: 'smooth' });
            } else {
                alert("වැරදි Password එකක්! ඔබට ඇතුල් විය නොහැක.");
            }
        }

        // අලුත් Software එකක් Page එකට එකතු කිරීම
        function addNewSoftware() {
            const name = document.getElementById('appName').value;
            const icon = document.getElementById('appIcon').value || "https://cdn-icons-png.flaticon.com/512/4144/4144776.png";
            const desc = document.getElementById('appDesc').value;
            const screenshot = document.getElementById('appScreenshot').value;
            const video = document.getElementById('appVideo').value;
            const size = document.getElementById('appSize').value;
            const link = document.getElementById('appLink').value;

            if(!name || !desc || !link) {
                alert("කරුණාකර නම, විස්තරය සහ ඩවුන්ලෝඩ් ලින්ක් එක අනිවාර්යයෙන්ම පුරවන්න.");
                return;
            }

            // Screenshot HTML සකස් කිරීම
            let screenHTML = '';
            if(screenshot) {
                screenHTML = `
                    <div class="screenshot-gallery">
                        <img src="${screenshot}" class="screenshot-img" alt="Screenshot">
                    </div>`;
            }

            // Video HTML සකස් කිරීම
            let videoHTML = '';
            if(video) {
                let videoId = video.split('v=')[1] || video.split('/').pop();
                if(videoId.includes('&')) { videoId = videoId.split('&')[0]; }
                videoHTML = `
                    <div class="video-container">
                        <iframe src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe>
                    </div>`;
            }

            // අලුත් Card එකක් නිර්මාණය
            const container = document.getElementById('apps-container');
            const card = document.createElement('div');
            card.className = 'software-card';
            card.innerHTML = `
                <img src="${icon}" class="app-icon" alt="App Icon">
                <h3>${name}</h3>
                <p>${desc}</p>
                ${screenHTML}
                ${videoHTML}
                <small style="display:block; color:#999; margin-top:10px;">Size: ${size || 'Unknown'}</small>
                <a href="${link}" target="_blank" class="download-btn">Download Now</a>
            `;

            // Grid එකේ මුලටම එකතු කිරීම
            container.insertBefore(card, container.firstChild);
            
            // Form එක Clear කිරීම
            document.getElementById('appName').value = '';
            document.getElementById('appIcon').value = '';
            document.getElementById('appDesc').value = '';
            document.getElementById('appScreenshot').value = '';
            document.getElementById('appVideo').value = '';
            document.getElementById('appSize').value = '';
            document.getElementById('appLink').value = '';
            
            alert("සාර්ථකව එකතු කරගන්නා ලදී!");
        }
    </script>
</body>
</html>
